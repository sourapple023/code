<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OMNI HTML Reader v5</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0b0b0d;
  --fg:#eaeaea;
  --muted:#777;
  --accent:#00f5ff;
  --panel:#111;
  --line:rgba(255,255,255,.08);
}

[data-theme="light"]{
  --bg:#fff;
  --fg:#0b0b0d;
  --muted:#666;
  --accent:#0066ff;
  --panel:#f6f7f8;
  --line:rgba(0,0,0,.1);
}

*{box-sizing:border-box}

html,body{
  margin:0;height:100%;
  background:var(--bg);
  color:var(--fg);
  font-family:system-ui;
}

body{display:flex;flex-direction:column}

/* HEADER */
header{
  padding:10px 14px;
  border-bottom:1px solid var(--line);
  display:flex;
  gap:8px;
  align-items:center;
}

input[type="search"]{
  background:var(--panel);
  border:1px solid var(--line);
  color:var(--fg);
  padding:6px 10px;
  border-radius:10px;
  width:200px;
}

button{
  background:transparent;
  color:var(--fg);
  border:1px solid var(--line);
  padding:6px 10px;
  border-radius:10px;
  cursor:pointer;
}
button:hover{color:var(--accent);border-color:var(--accent)}

#status{margin-left:auto;font-size:12px;color:var(--muted)}

/* MAIN */
main{
  flex:1;
  display:flex;
  min-height:0;
}

/* SIDEBAR */
#sidebar{
  width:260px;
  background:var(--panel);
  border-right:1px solid var(--line);
  overflow:auto;
  padding-bottom:40px;
}

.node{
  padding:6px 12px;
  cursor:pointer;
  user-select:none;
}

.node.file.active{
  background:rgba(0,245,255,.12);
  color:var(--accent);
}

.node:hover{background:rgba(255,255,255,.05)}

.folder{
  font-weight:600;
}

.children{
  margin-left:12px;
}

/* EDITOR */
#editor{
  width:40%;
  min-width:280px;
  display:flex;
  border-right:1px solid var(--line);
}

#lineNumbers{
  width:44px;
  padding:10px 6px;
  background:rgba(255,255,255,.04);
  color:var(--muted);
  text-align:right;
  font-family:ui-monospace;
  font-size:13px;
  line-height:1.45;
  overflow:hidden;
}

textarea{
  flex:1;
  border:none;
  outline:none;
  resize:none;
  background:var(--panel);
  color:var(--fg);
  padding:10px;
  font-size:13px;
  line-height:1.45;
  font-family:ui-monospace;
}

/* PREVIEW */
#previewWrap{flex:1}
iframe{
  width:100%;
  height:100%;
  border:none;
  background:var(--bg);
}

@media(max-width:900px){
  main{flex-direction:column}
  #sidebar{width:100%;display:flex;flex-wrap:wrap}
  #editor{width:100%;height:40%}
}
</style>
</head>

<body data-theme="dark">

<header>
  <strong>OMNI HTML Reader</strong>
  <input type="search" id="search" placeholder="Search files or content…">
  <button onclick="newFolder()">+ Folder</button>
  <button onclick="newFile()">+ File</button>
  <button onclick="toggleTheme()">Theme</button>
  <span id="status"></span>
</header>

<main>
  <aside id="sidebar"></aside>

  <section id="editor">
    <div id="lineNumbers"></div>
    <textarea id="input" spellcheck="false"></textarea>
  </section>

  <section id="previewWrap">
    <iframe id="preview" sandbox="allow-same-origin"></iframe>
  </section>
</main>

<script>
/* STORAGE */
const KEY='omni_fs'
const ACTIVE='omni_active'
const THEME='omni_theme'

let fs=JSON.parse(localStorage.getItem(KEY)||'null')
let active=localStorage.getItem(ACTIVE)

if(!fs){
  fs={
    type:'folder',
    name:'root',
    open:true,
    children:[
      {type:'file',name:'index.html',content:sampleHTML()}
    ]
  }
  active='index.html'
  save()
}

const sidebar=document.getElementById('sidebar')
const input=document.getElementById('input')
const preview=document.getElementById('preview')
const lines=document.getElementById('lineNumbers')
const search=document.getElementById('search')
const status=document.getElementById('status')

/* RENDER TREE */
function render(node,el,query=''){
  node.children?.forEach(n=>{
    if(query && !matchNode(n,query)) return

    const d=document.createElement('div')
    d.className='node '+n.type
    d.textContent=(n.type==='folder'?'📁 ':'📄 ')+n.name

    if(n.type==='file' && n.name===active) d.classList.add('active')

    d.onclick=()=>{
      if(n.type==='folder'){
        n.open=!n.open
        save()
        draw()
      }else{
        openFile(n)
      }
    }
    el.appendChild(d)

    if(n.type==='folder' && n.open){
      const c=document.createElement('div')
      c.className='children'
      el.appendChild(c)
      render(n,c,query)
    }
  })
}

function draw(){
  sidebar.innerHTML=''
  render(fs,sidebar,search.value.toLowerCase())
}

/* SEARCH */
search.oninput=draw
function matchNode(n,q){
  if(n.name.toLowerCase().includes(q)) return true
  if(n.type==='file' && n.content.toLowerCase().includes(q)) return true
  if(n.type==='folder') return n.children.some(c=>matchNode(c,q))
  return false
}

/* FILE OPS */
function findFile(name,node=fs){
  for(const c of node.children){
    if(c.type==='file' && c.name===name) return c
    if(c.type==='folder'){
      const f=findFile(name,c)
      if(f) return f
    }
  }
}

function openFile(f){
  active=f.name
  input.value=f.content
  preview.srcdoc=f.content
  updateLines()
  save()
  draw()
}

input.oninput=()=>{
  const f=findFile(active)
  if(f){
    f.content=input.value
    preview.srcdoc=input.value
    updateLines()
    autoSave()
  }
}

function newFile(){
  const name=prompt('File name','page.html')
  if(!name) return
  fs.children.push({type:'file',name,content:''})
  save()
  draw()
}

function newFolder(){
  const name=prompt('Folder name','folder')
  if(!name) return
  fs.children.push({type:'folder',name,open:true,children:[]})
  save()
  draw()
}

/* LINE NUMBERS */
input.onscroll=()=>lines.scrollTop=input.scrollTop
function updateLines(){
  const n=input.value.split('\n').length
  lines.innerHTML=Array.from({length:n},(_,i)=>i+1).join('<br>')
}

/* SAVE */
let t
function autoSave(){
  clearTimeout(t)
  t=setTimeout(save,400)
}
function save(){
  localStorage.setItem(KEY,JSON.stringify(fs))
  localStorage.setItem(ACTIVE,active)
  status.textContent='Saved'
  setTimeout(()=>status.textContent='',700)
}

/* THEME */
function toggleTheme(){
  const t=document.body.dataset.theme==='dark'?'light':'dark'
  document.body.dataset.theme=t
  localStorage.setItem(THEME,t)
}
const th=localStorage.getItem(THEME)
if(th) document.body.dataset.theme=th

draw()

function sampleHTML(){
return `<!DOCTYPE html>
<html>
<body>
<h1>OMNI Reader</h1>
<p>Folders, files, search.</p>
</body>
</html>`
}
</script>

</body>
</html>
