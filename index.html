<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Web Playground</title>

<meta name="viewport"
  content="width=device-width,
  initial-scale=1,
  maximum-scale=1,
  viewport-fit=cover" />

<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%}

body{
  font-family:system-ui;
  background:#0d1117;
  color:#e6edf3;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  padding:10px 14px;
  border-bottom:1px solid #30363d;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
  justify-content:space-between;
}

button,input{
  border:1px solid #30363d;
  background:#161b22;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
}
button:hover{background:#303a45}

#status{font-size:12px;opacity:.7}

/* MAIN */
main{
  flex:1;
  display:flex;
  min-height:0;
  position:relative;
}

/* EDITOR */
.editorColumn{
  display:flex;
  flex-direction:column;
  border-right:1px solid #30363d;
  position:relative;
  min-width:280px;
}
label{
  font-size:11px;
  opacity:.6;
  padding:4px 8px;
}
textarea{
  flex:1;
  border:none;
  outline:none;
  resize:none;
  background:#161b22;
  color:white;
  padding:12px;
  font-family:monospace;
  font-size:14px;
}

/* ﾃｰﾅｸ窶伉ｻ Ghost */
.ghost{
  position:absolute;
  left:12px;
  right:12px;
  bottom:12px;
  color:#6b7280;
  font-family:monospace;
  font-size:14px;
  pointer-events:none;
  white-space:pre-wrap;
  opacity:.45;
  display:none;
}

/* DIVIDER */
.divider{
  width:6px;
  cursor:col-resize;
  background:#0b0f14;
  border-left:1px solid #30363d;
  border-right:1px solid #30363d;
}
.divider:hover{background:#30363d}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:240px;
}
iframe{
  flex:1;
  border:none;
  background:white;
}

/* PANELS */
.panel{
  font-size:12px;
  padding:8px;
  border-top:1px solid #30363d;
  background:#0b0f14;
}

/* FULLSCREEN PREVIEW */
body.fs header,
body.fs .editorColumn,
body.fs .divider{
  display:none;
}
body.fs .preview{
  position:fixed;
  inset:0;
  z-index:9999;
  background:#000;
}

/* FULLSCREEN EDITOR */
body.efs header,
body.efs .preview,
body.efs .divider{
  display:none;
}
body.efs .editorColumn{
  position:fixed;
  inset:0;
  z-index:9999;
  border:none;
}

/* FLOATING EXIT */
.fs-exit{
  position:fixed;
  bottom:16px;
  right:16px;
  z-index:10000;
  padding:10px 16px;
  border-radius:999px;
  font-size:14px;
  display:none;
}
body.fs .fs-exit,
body.efs .fs-exit{
  display:block;
}

/* MOBILE */
@media(max-width:900px){
  main{flex-direction:column}
  .divider{display:none}
  .editorColumn{
    border-right:none;
    border-bottom:1px solid #30363d;
  }
}
</style>
</head>

<body>
<header>
  <strong>Web Playground</strong>
  <div>
    <button onclick="run()">Run</button>
    <button onclick="togglePreviewFS()">Preview FS</button>
    <button onclick="toggleEditorFS()">Editor FS</button>
    <span id="status">Ready</span>
  </div>
</header>

<main>
  <div class="editorColumn" id="editor">
    <label>HTML Document</label>
    <textarea id="doc"></textarea>
    <div class="ghost" id="ghost"></div>
  </div>

  <div class="divider" id="divider"></div>

  <div class="preview">
    <iframe id="preview"></iframe>
    <div class="panel">ﾃｰﾅｸﾂｧ  ready</div>
  </div>
</main>

<button class="fs-exit" onclick="exitFullscreen()">Exit Fullscreen</button>

<script>
/* ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ ELEMENTS ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ */
const docI = document.getElementById("doc")
const preview = document.getElementById("preview")
const editor = document.getElementById("editor")
const divider = document.getElementById("divider")
const statusEl = document.getElementById("status")

/* ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ DRAG DIVIDER ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ */
let dragging=false
divider.addEventListener("pointerdown",e=>{
  dragging=true
  divider.setPointerCapture(e.pointerId)
})
window.addEventListener("pointermove",e=>{
  if(!dragging) return
  const min=280
  const max=window.innerWidth-240
  const w=Math.min(max,Math.max(min,e.clientX))
  editor.style.flex=`0 0 ${w}px`
})
window.addEventListener("pointerup",()=>dragging=false)

/* ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ FULLSCREEN MODES ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ */
function togglePreviewFS(){
  document.body.classList.toggle("fs")
  document.body.classList.remove("efs")
}
function toggleEditorFS(){
  document.body.classList.toggle("efs")
  document.body.classList.remove("fs")
}
function exitFullscreen(){
  document.body.classList.remove("fs","efs")
}

/* ESC EXIT (desktop) */
window.addEventListener("keydown",e=>{
  if(e.key==="Escape") exitFullscreen()
})

/* ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ SWIPE DOWN TO EXIT (MOBILE) ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ */
let touchStartY=null
let touchStartX=null

window.addEventListener("touchstart",e=>{
  if(!document.body.classList.contains("fs") &&
     !document.body.classList.contains("efs")) return

  const t=e.touches[0]
  touchStartY=t.clientY
  touchStartX=t.clientX
},{passive:true})

window.addEventListener("touchmove",e=>{
  if(touchStartY===null) return

  const t=e.touches[0]
  const dy=t.clientY-touchStartY
  const dx=Math.abs(t.clientX-touchStartX)

  // Require mostly vertical swipe
  if(dy>120 && dx<60){
    exitFullscreen()
    touchStartY=null
    touchStartX=null
  }
},{passive:true})

window.addEventListener("touchend",()=>{
  touchStartY=null
  touchStartX=null
})

/* ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ RUN ﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎﾃ｢窶昶ぎ */
function run(){
  let html=docI.value
  if(!/<!doctype/i.test(html)){
    html=`<!DOCTYPE html>\n${html}`
  }
  preview.srcdoc=html
  statusEl.textContent="Synced"
}

/* AUTORUN */
let t
docI.oninput=()=>{
  statusEl.textContent="Typingﾃ｢竄ｬﾂｦ"
  clearTimeout(t)
  t=setTimeout(run,300)
}

/* INIT */
run()
</script>
</body>
</html>
