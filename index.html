<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maybe - AI</title>
    <style>
        /* Terminal Style CSS - All in one file */
        body {
            background-color: #000;
            color: #0F0; /* Green text */
            font-family: 'IBM Plex Mono', 'Consolas', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden; /* Prevent body scroll */
        }

        @font-face {
            font-family: 'IBM Plex Mono';
            font-style: normal;
            font-weight: 400;
            src: url('https://fonts.gstatic.com/s/ibmplexmono/v18/KFOlCnNyYLJuPbfjQzFwaS0wxl7Kyyl6.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        #terminal-output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap; /* Preserve whitespace and wrap lines */
            word-wrap: break-word; /* Break long words */
            margin-bottom: 10px;
            padding-right: 10px; /* Space for scrollbar */
            line-height: 1.5;
            font-size: var(--terminal-font-size, 1em); /* Use CSS variable */
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }

        #terminal-output::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .prompt-prefix {
            color: #0F0; /* Default green */
            margin-right: 5px;
            flex-shrink: 0; /* Prevent prefix from shrinking */
        }

        .user-input-text {
            color: #FFF; /* White for user's actual input */
        }

        .ai-response-text {
            color: #0FF; /* Cyan for AI response */
        }

        .system-message {
            color: #FF0; /* Yellow for system messages */
        }

        #terminal-input-line {
            display: flex;
            align-items: baseline;
            gap: 5px; /* Space between prefix and input */
        }

        #terminal-input {
            flex-grow: 1;
            background-color: #111;
            color: #0F0;
            border: none;
            outline: none;
            padding: 8px 10px;
            font-family: inherit;
            font-size: var(--terminal-font-size, 1em); /* Inherit font size */
            caret-color: #0F0; /* Blinking cursor color */
            margin-top: 5px; /* Add some space above input */
        }

        #terminal-input::placeholder {
            color: #444;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1em;
            background-color: #0F0;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to { background-color: transparent; }
            50% { background-color: #0F0; }
        }

        .error-message {
            color: #F00; /* Red for errors */
        }

        .loading-dots::after {
            content: '';
            animation: dots 1s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: '....'; }
        }

        /* Command specific styling */
        .command-output {
            color: #AFA; /* Light green for command output */
        }
        .ai-greeting {
            color: #0FF;
        }
        .ai-greeting .prompt-prefix {
            color: #0FF; /* Match _maybe_ prefix with AI color for greeting */
        }
    </style>
</head>
<body>
    <div id="terminal-output"></div>
    <div id="terminal-input-line">
        <span class="prompt-prefix" id="user-prompt-prefix">user@maybe:~$</span>
        <input type="text" id="terminal-input" autofocus placeholder="Ask Maybe something or type 'help'...">
    </div>

    <script>
        // JavaScript Logic - All in one file
        // --- Configuration & Constants ---
        const BACKEND_API_ENDPOINT = 'http://localhost:3001/api/chat'; // Our backend endpoint

        // --- DOM Elements ---
        const terminalOutput = document.getElementById('terminal-output');
        const terminalInput = document.getElementById('terminal-input');
        const userPromptPrefixSpan = document.getElementById('user-prompt-prefix');

        // --- State Variables ---
        let aiTypingSpeed = parseInt(localStorage.getItem('maybeAiTypingSpeed') || '30', 10);
        let aiTemperature = parseFloat(localStorage.getItem('maybeAiTemperature') || '0.7');
        let aiMaxOutputTokens = parseInt(localStorage.getItem('maybeAiMaxOutputTokens') || '500', 10);
        let currentFontSize = localStorage.getItem('maybeFontSize') || '1em';
        let currentPromptPrefix = localStorage.getItem('maybePromptPrefix') || 'user@maybe:~$';
        let enableTimestamps = (localStorage.getItem('maybeEnableTimestamps') === 'true');
        let enableTypingAnimation = (localStorage.getItem('maybeEnableTypingAnimation') !== 'false');

        // Conversation history now only stores user/model turns, the initial persona is handled by the backend.
        let conversationHistory = [];
        let temporaryPersonaOverride = localStorage.getItem('maybeCustomInitialPersona') || null; // For `edit_initial_persona`

        let clientErrorLog = [];
        let commandHistory = [];
        let commandHistoryIndex = -1;
        let lastAiResponse = '';
        let isBackendAvailable = false; // Track backend status

        // --- Utility Functions ---

        function saveSetting(key, value) {
            localStorage.setItem(`maybe${key}`, value);
        }

        function getTimestamp() {
            return enableTimestamps ? `<span style="color:#555">[${new Date().toLocaleTimeString()}]</span> ` : '';
        }

        function appendOutput(content, className = '') {
            const line = document.createElement('div');
            line.innerHTML = getTimestamp() + content; // Using innerHTML to allow for HTML tags like <span>
            if (className) {
                line.classList.add(className);
            }
            terminalOutput.appendChild(line);
            terminalOutput.scrollTop = terminalOutput.scrollHeight; // Scroll to bottom
        }

        function setTerminalFontSize(size) {
            document.documentElement.style.setProperty('--terminal-font-size', size);
            currentFontSize = size;
            saveSetting('FontSize', size);
            appendOutput(`<span class="command-output">Font size set to: ${size}</span>`);
        }

        function setPromptPrefix(prefix) {
            currentPromptPrefix = prefix;
            userPromptPrefixSpan.textContent = prefix;
            saveSetting('PromptPrefix', prefix);
            appendOutput(`<span class="command-output">Prompt prefix set to: ${prefix}</span>`);
        }

        function logClientError(message) {
            const timestamp = new Date().toISOString();
            clientErrorLog.push({ timestamp, message });
            if (clientErrorLog.length > 20) { // Keep last 20 errors
                clientErrorLog.shift();
            }
            appendOutput(`<span class="error-message">Client Error: ${message}</span>`, 'system-message');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                appendOutput('<span class="command-output">Copied to clipboard.</span>');
            }).catch(err => {
                logClientError(`Failed to copy to clipboard: ${err}`);
                appendOutput('<span class="error-message">Failed to copy to clipboard.</span>');
            });
        }

        // --- Core Terminal Functions ---

        async function initTerminal() {
            setTerminalFontSize(currentFontSize);
            setPromptPrefix(currentPromptPrefix);

            appendOutput(`<span class="system-message">_maybe_: Initializing core processes...</span>`, 'system-message');
            terminalInput.disabled = true;
            terminalInput.placeholder = "Connecting to backend...";

            try {
                // Ping backend to check availability
                const backendStatus = await fetch('http://localhost:3001');
                if (backendStatus.ok) {
                    isBackendAvailable = true;
                    appendOutput('<span class="system-message">Backend connection established.</span>', 'system-message');
                } else {
                    throw new Error(`Backend responded with status: ${backendStatus.status}`);
                }
            } catch (error) {
                logClientError(`Backend connection failed: ${error.message}`);
                appendOutput('<span class="error-message">ERROR: Could not connect to backend server. Please ensure the backend (server.js) is running on http://localhost:3001.</span>', 'system-message');
                terminalInput.placeholder = "Backend offline.";
                return; // Stop initialization if backend is down
            }

            // Simulate typing for initial greeting
            const initialGreeting = `_maybe_: Hello. I am Maybe. What possibilities shall we explore today?`;
            let typedGreeting = '';
            let i = 0;
            const delay = 50; // ms per character for initial greeting

            const greetingLine = document.createElement('div');
            greetingLine.classList.add('ai-greeting'); // Specific class for initial greeting
            terminalOutput.appendChild(greetingLine);

            function typeChar() {
                if (i < initialGreeting.length) {
                    typedGreeting += initialGreeting.charAt(i);
                    // Split prefix and text for styling
                    if (typedGreeting.startsWith('_maybe_: ')) {
                        greetingLine.innerHTML = `<span class="prompt-prefix">_maybe_:</span> <span class="ai-response-text">${typedGreeting.substring('_maybe_: '.length)}</span>`;
                    } else {
                        greetingLine.innerHTML = `<span class="ai-response-text">${typedGreeting}</span>`;
                    }

                    terminalOutput.scrollTop = terminalOutput.scrollHeight;
                    i++;
                    setTimeout(typeChar, delay);
                } else {
                    terminalInput.disabled = false;
                    terminalInput.placeholder = "Ask Maybe something or type 'help'...";
                    terminalInput.focus();
                }
            }
            typeChar(); // Start typing the initial greeting
        }

        async function sendMessage(message, isCommand = false) {
            message = message.trim();
            if (!message) return;

            // Add to command history
            if (!isCommand && message !== commandHistory[commandHistory.length - 1]) {
                commandHistory.push(message);
            }
            commandHistoryIndex = commandHistory.length; // Reset index for new input

            if (!isCommand) {
                const userOutput = `<span class="prompt-prefix">${currentPromptPrefix}</span> <span class="user-input-text">${message}</span>`;
                appendOutput(userOutput);
            }
            terminalInput.value = '';
            terminalInput.disabled = true;
            terminalInput.placeholder = "Maybe is thinking...";

            // Check if it's a command
            if (await processCommand(message)) {
                terminalInput.disabled = false;
                terminalInput.placeholder = "Ask Maybe something or type 'help'...";
                terminalInput.focus();
                return;
            }

            if (!isBackendAvailable) {
                appendOutput('<span class="error-message">ERROR: Backend is not available. Please start the server.</span>', 'system-message');
                terminalInput.disabled = false;
                terminalInput.placeholder = "Backend offline. Cannot chat.";
                terminalInput.focus();
                return;
            }

            // Add user message to conversation history
            conversationHistory.push({
                role: 'user',
                parts: [{ text: message }]
            });

            // Display "Thinking..." indicator
            const thinkingLine = document.createElement('div');
            thinkingLine.innerHTML = `<span class="prompt-prefix">_maybe_:</span> <span class="ai-response-text loading-dots">Thinking</span>`;
            terminalOutput.appendChild(thinkingLine);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;

            try {
                const requestBody = {
                    history: conversationHistory,
                    temperature: aiTemperature,
                    maxOutputTokens: aiMaxOutputTokens
                };
                if (temporaryPersonaOverride) {
                    requestBody.overridePersona = temporaryPersonaOverride;
                }

                const response = await fetch(BACKEND_API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`Backend Error ${response.status}: ${errorData.error || response.statusText}`);
                }

                const data = await response.json();
                let aiResponseText = data.text;

                if (!aiResponseText) {
                    aiResponseText = "Maybe I am having trouble forming a response right now. Could you rephrase your thought?";
                }
                lastAiResponse = aiResponseText; // Store for copy_last command

                // Remove the "Thinking..." line
                if (terminalOutput.contains(thinkingLine)) {
                    terminalOutput.removeChild(thinkingLine);
                }

                // Add AI response to conversation history
                conversationHistory.push({
                    role: 'model',
                    parts: [{ text: aiResponseText }]
                });

                // Display AI's message with typing effect or instantly
                const aiResponseLine = document.createElement('div');
                terminalOutput.appendChild(aiResponseLine);

                if (enableTypingAnimation) {
                    let typedResponse = '';
                    let i = 0;
                    function typeResponseChar() {
                        if (i < aiResponseText.length) {
                            typedResponse += aiResponseText.charAt(i);
                            aiResponseLine.innerHTML = getTimestamp() + `<span class="prompt-prefix">_maybe_:</span> <span class="ai-response-text">${typedResponse}</span>`;
                            terminalOutput.scrollTop = terminalOutput.scrollHeight;
                            i++;
                            setTimeout(typeResponseChar, aiTypingSpeed);
                        } else {
                            terminalInput.disabled = false;
                            terminalInput.placeholder = "Ask Maybe something or type 'help'...";
                            terminalInput.focus();
                        }
                    }
                    typeResponseChar();
                } else {
                     aiResponseLine.innerHTML = getTimestamp() + `<span class="prompt-prefix">_maybe_:</span> <span class="ai-response-text">${aiResponseText}</span>`;
                    terminalOutput.scrollTop = terminalOutput.scrollHeight;
                    terminalInput.disabled = false;
                    terminalInput.placeholder = "Ask Maybe something or type 'help'...";
                    terminalInput.focus();
                }


            } catch (error) {
                // Remove the "Thinking..." line if an error occurred during request
                if (terminalOutput.contains(thinkingLine)) {
                    terminalOutput.removeChild(thinkingLine);
                }
                const errorMessage = `<span class="error-message">Error communicating with backend: ${error.message}. Is the backend server running and accessible?</span>`;
                appendOutput(errorMessage, 'system-message');
                logClientError(error.message);
                terminalInput.disabled = false;
                terminalInput.placeholder = "Error. Try again?";
                terminalInput.focus();
                // Optionally remove the last user message from history if it didn't get a response
                if (conversationHistory.length > 0 && conversationHistory[conversationHistory.length - 1].role === 'user') {
                    conversationHistory.pop();
                }
            }
        }

        async function processCommand(command) {
            const parts = command.split(' ');
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1).join(' ');

            switch (cmd) {
                case 'help':
                    appendOutput(`
                        <span class="command-output">--- Maybe Commands ---</span>
                        <span class="command-output">help                               - Show this help message.</span>
                        <span class="command-output">clear                              - Clear the terminal screen.</span>
                        <span class="command-output">reset                              - Clear the current conversation history (local only).</span>
                        <span class="command-output">info                               - Display current settings and status.</span>
                        <span class="command-output">history                            - Show previously entered commands.</span>
                        <span class="command-output">fontsize &lt;size&gt;                   - Set terminal font size (e.g., 1em, 0.9rem).</span>
                        <span class="command-output">typespeed &lt;ms&gt;                     - Set AI typing speed in milliseconds (e.g., 30).</span>
                        <span class="command-output">set_temp &lt;value&gt;                 - Set AI generation temperature (0.0-1.0, e.g., 0.7).</span>
                        <span class="command-output">set_max_tokens &lt;value&gt;           - Set max output tokens for AI (e.g., 500).</span>
                        <span class="command-output">set_prompt_prefix &lt;prefix&gt;       - Change your user prompt prefix (e.g., me@terminal:$).</span>
                        <span class="command-output">edit_persona &lt;text&gt;              - Set a TEMPORARY custom persona for Maybe (cleared on reset/refresh).</span>
                        <span class="command-output">reset_persona                      - Clear the temporary custom persona.</span>
                        <span class="command-output">ask_as &lt;persona&gt; &lt;question&gt;        - Ask Maybe a question from a specific temporary persona for one turn.</span>
                        <span class="command-output">copy_last                          - Copy the last AI response to clipboard.</span>
                        <span class="command-output">export                             - Copy the entire conversation to clipboard.</span>
                        <span class="command-output">load_chat &lt;text&gt;                   - Append text to current conversation history (basic import).</span>
                        <span class="command-output">timestamp_toggle                   - Toggle timestamps on output lines.</span>
                        <span class="command-output">toggle_typing                      - Toggle AI typing animation on/off.</span>
                        <span class="command-output">show_errors                        - Display recent client-side errors.</span>
                        <span class="command-output">--- End Commands ---</span>
                    `);
                    return true;

                case 'clear':
                    terminalOutput.innerHTML = '';
                    appendOutput('<span class="command-output">Terminal cleared.</span>');
                    return true;

                case 'reset':
                    conversationHistory = [];
                    temporaryPersonaOverride = null;
                    localStorage.removeItem('maybeCustomInitialPersona');
                    appendOutput('<span class="command-output">Conversation history cleared. Temporary persona reset.</span>');
                    return true;

                case 'set_api_key':
                    appendOutput('<span class="error-message">The API Key is now managed securely on the backend. Please set it in your backend\'s .env file.</span>', 'system-message');
                    return true;

                case 'fontsize':
                    if (args) {
                        setTerminalFontSize(args);
                    } else {
                        appendOutput(`<span class="command-output">Current font size: ${currentFontSize}</span>`);
                        appendOutput('<span class="error-message">Usage: fontsize &lt;size&gt; (e.g., 1em, 16px)</span>');
                    }
                    return true;

                case 'typespeed':
                    const speed = parseInt(args, 10);
                    if (!isNaN(speed) && speed >= 0) {
                        aiTypingSpeed = speed;
                        saveSetting('AiTypingSpeed', speed);
                        appendOutput(`<span class="command-output">AI typing speed set to ${speed}ms per character.</span>`);
                    } else {
                        appendOutput(`<span class="command-output">Current typing speed: ${aiTypingSpeed}ms</span>`);
                        appendOutput('<span class="error-message">Usage: typespeed &lt;milliseconds&gt; (e.g., 30 for fast)</span>');
                    }
                    return true;

                case 'set_temp':
                    const temp = parseFloat(args);
                    if (!isNaN(temp) && temp >= 0.0 && temp <= 1.0) {
                        aiTemperature = temp;
                        saveSetting('AiTemperature', temp);
                        appendOutput(`<span class="command-output">AI temperature set to ${temp}.</span>`);
                    } else {
                        appendOutput(`<span class="command-output">Current AI temperature: ${aiTemperature}</span>`);
                        appendOutput('<span class="error-message">Usage: set_temp &lt;value&gt; (0.0 to 1.0, e.g., 0.7)</span>');
                    }
                    return true;

                case 'set_max_tokens':
                    const maxTokens = parseInt(args, 10);
                    if (!isNaN(maxTokens) && maxTokens > 0) {
                        aiMaxOutputTokens = maxTokens;
                        saveSetting('AiMaxOutputTokens', maxTokens);
                        appendOutput(`<span class="command-output">AI max output tokens set to ${maxTokens}.</span>`);
                    } else {
                        appendOutput(`<span class="command-output">Current AI max output tokens: ${aiMaxOutputTokens}</span>`);
                        appendOutput('<span class="error-message">Usage: set_max_tokens &lt;value&gt; (e.g., 500)</span>`);
                    }
                    return true;

                case 'info':
                    appendOutput(`
                        <span class="command-output">--- System Info ---</span>
                        <span class="command-output">Backend Status: ${isBackendAvailable ? '<span style="color:#0F0">Connected</span>' : '<span style="color:#F00">Disconnected</span>'}</span>
                        <span class="command-output">Backend Endpoint: ${BACKEND_API_ENDPOINT}</span>
                        <span class="command-output">AI Temperature: ${aiTemperature}</span>
                        <span class="command-output">AI Max Output Tokens: ${aiMaxOutputTokens}</span>
                        <span class="command-output">AI Typing Speed: ${aiTypingSpeed}ms</span>
                        <span class="command-output">Terminal Font Size: ${currentFontSize}</span>
                        <span class="command-output">Prompt Prefix: ${currentPromptPrefix}</span>
                        <span class="command-output">Timestamps Enabled: ${enableTimestamps}</span>
                        <span class="command-output">Typing Animation Enabled: ${enableTypingAnimation}</span>
                        <span class="command-output">Conversation History Length: ${conversationHistory.length} entries (local)</span>
                        <span class="command-output">Temporary Persona Override: ${temporaryPersonaOverride ? '<span style="color:#FF0">Active</span>' : 'None'}</span>
                        <span class="command-output">--- End Info ---</span>
                    `);
                    return true;

                case 'history':
                    if (commandHistory.length === 0) {
                        appendOutput('<span class="command-output">No command history.</span>');
                    } else {
                        appendOutput('<span class="command-output">--- Command History ---</span>');
                        commandHistory.forEach((cmd, index) => {
                            appendOutput(`<span class="command-output">${index + 1}: ${cmd}</span>`);
                        });
                        appendOutput('<span class="command-output">--- End History ---</span>');
                    }
                    return true;

                case 'copy_last':
                    if (lastAiResponse) {
                        copyToClipboard(lastAiResponse);
                    } else {
                        appendOutput('<span class="error-message">No previous AI response to copy.</span>');
                    }
                    return true;

                case 'export':
                    let fullConversation = '';
                    conversationHistory.forEach(entry => {
                        const prefix = entry.role === 'user' ? currentPromptPrefix : '_maybe_:';
                        fullConversation += `${prefix} ${entry.parts[0].text}\n\n`;
                    });
                    copyToClipboard(fullConversation.trim());
                    return true;

                case 'load_chat':
                    if (args) {
                        appendOutput('<span class="command-output">Attempting to append chat history...</span>');
                        conversationHistory.push({ role: 'user', parts: [{ text: `(Loaded chat snippet begins here): ${args}` }] });
                        appendOutput('<span class="command-output">Chat snippet appended.</span>');
                    } else {
                        appendOutput('<span class="error-message">Usage: load_chat &lt;text_to_append_to_history&gt;</span>');
                    }
                    return true;

                case 'timestamp_toggle':
                    enableTimestamps = !enableTimestamps;
                    saveSetting('EnableTimestamps', enableTimestamps);
                    appendOutput(`<span class="command-output">Timestamps ${enableTimestamps ? 'enabled' : 'disabled'}.</span>`);
                    return true;

                case 'toggle_typing':
                    enableTypingAnimation = !enableTypingAnimation;
                    saveSetting('EnableTypingAnimation', enableTypingAnimation);
                    appendOutput(`<span class="command-output">AI typing animation ${enableTypingAnimation ? 'enabled' : 'disabled'}.</span>`);
                    return true;

                case 'show_errors':
                    if (clientErrorLog.length === 0) {
                        appendOutput('<span class="command-output">No client-side errors logged.</span>');
                    } else {
                        appendOutput('<span class="command-output">--- Client Error Log ---</span>');
                        clientErrorLog.forEach(error => {
                            appendOutput(`<span class="error-message">[${error.timestamp}] ${error.message}</span>`);
                        });
                        appendOutput('<span class="command-output">--- End Error Log ---</span>');
                    }
                    return true;

                case 'ask_as':
                    const askAsParts = args.match(/^(\S+)\s+(.*)/);
                    if (askAsParts && askAsParts.length === 3) {
                        const persona = askAsParts[1];
                        const question = askAsParts[2];
                        const temporaryPrompt = `(As ${persona}): ${question}`;
                        // We push this directly into history, the backend's persona is still active as base.
                        // For a *strong* temporary persona, you might use 'overridePersona' in request body.
                        // For now, it's just a strong instruction within the current message.
                        sendMessage(temporaryPrompt, false); // Send as a regular message to be added to history
                        return true;
                    } else {
                        appendOutput('<span class="error-message">Usage: ask_as &lt;persona_name&gt; &lt;your_question&gt; (e.g., ask_as a wise philosopher What is truth?)</span>');
                    }
                    return true;

                case 'set_prompt_prefix':
                    if (args) {
                        setPromptPrefix(args);
                    } else {
                        appendOutput(`<span class="command-output">Current prompt prefix: ${currentPromptPrefix}</span>`);
                        appendOutput('<span class="error-message">Usage: set_prompt_prefix &lt;new_prefix&gt; (e.g., my_user@pc:$)</span>');
                    }
                    return true;

                case 'edit_persona': // Renamed for clarity: it's a *temporary* edit
                    if (args) {
                        temporaryPersonaOverride = args;
                        appendOutput('<span class="command-output">Maybe\'s TEMPORARY persona updated. This will override the backend\'s base persona for all subsequent requests until reset or refreshed.</span>', 'system-message');
                        saveSetting('CustomInitialPersona', args);
                    } else {
                        appendOutput('<span class="command-output">Current temporary persona override (first 100 chars):</span>');
                        appendOutput(`<span class="command-output">${temporaryPersonaOverride ? temporaryPersonaOverride.substring(0, 100) + '...' : 'None'}</span>`);
                        appendOutput('<span class="error-message">Usage: edit_persona &lt;new_persona_text&gt;</span>');
                    }
                    return true;

                case 'reset_persona': // Renamed for clarity
                    temporaryPersonaOverride = null;
                    appendOutput('<span class="command-output">Maybe\'s temporary persona override cleared. Now using backend\'s default persona.</span>', 'system-message');
                    localStorage.removeItem('maybeCustomInitialPersona'); // Clear custom persona from storage
                    return true;

                default:
                    return false; // Not a recognized command
            }
        }


        // --- Event Listeners ---

        terminalInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                sendMessage(terminalInput.value);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (commandHistory.length > 0 && commandHistoryIndex > 0) {
                    commandHistoryIndex--;
                    terminalInput.value = commandHistory[commandHistoryIndex];
                } else if (commandHistory.length > 0 && commandHistoryIndex === 0) {
                    // Stay at the first item
                    terminalInput.value = commandHistory[0];
                }
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                if (commandHistoryIndex < commandHistory.length - 1) {
                    commandHistoryIndex++;
                    terminalInput.value = commandHistory[commandHistoryIndex];
                } else {
                    // Clear input if going past last history item
                    commandHistoryIndex = commandHistory.length;
                    terminalInput.value = '';
                }
            }
        });

        // --- Initialization on Page Load ---
        window.addEventListener('load', () => {
            initTerminal();
        });
    </script>
</body>
</html>
