<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OMNI HTML Reader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0b0b0d;
  --fg:#eaeaea;
  --muted:#777;
  --accent:#00f5ff;
  --panel:#111;
  --line:rgba(255,255,255,.08);
}

[data-theme="light"]{
  --bg:#ffffff;
  --fg:#0b0b0d;
  --muted:#666;
  --accent:#0066ff;
  --panel:#f6f7f8;
  --line:rgba(0,0,0,.1);
}

*{box-sizing:border-box}

html,body{
  margin:0;height:100%;
  background:var(--bg);
  color:var(--fg);
  font-family:system-ui;
}

body{display:flex;flex-direction:column}

/* HEADER */
header{
  padding:10px 14px;
  border-bottom:1px solid var(--line);
  display:flex;
  gap:8px;
  align-items:center;
}

button{
  background:transparent;
  color:var(--fg);
  border:1px solid var(--line);
  padding:6px 10px;
  border-radius:10px;
  cursor:pointer;
}
button:hover{
  color:var(--accent);
  border-color:var(--accent);
}

#status{
  margin-left:auto;
  font-size:12px;
  color:var(--muted);
}

/* MAIN */
main{
  flex:1;
  display:flex;
  min-height:0;
}

/* FILE LIST */
#files{
  width:200px;
  background:var(--panel);
  border-right:1px solid var(--line);
  overflow:auto;
}
.file{
  padding:10px 12px;
  cursor:pointer;
  border-bottom:1px solid var(--line);
}
.file.active{
  background:rgba(0,245,255,.12);
  color:var(--accent);
}

/* EDITOR */
#editor{
  width:40%;
  min-width:280px;
  display:flex;
  border-right:1px solid var(--line);
}

#lineNumbers{
  width:44px;
  padding:10px 6px;
  background:rgba(255,255,255,.04);
  color:var(--muted);
  text-align:right;
  font-family:ui-monospace,SFMono-Regular,Menlo;
  font-size:13px;
  line-height:1.45;
  overflow:hidden;
}

textarea{
  flex:1;
  border:none;
  outline:none;
  resize:none;
  background:var(--panel);
  color:var(--fg);
  padding:10px;
  font-size:13px;
  line-height:1.45;
  font-family:ui-monospace,SFMono-Regular,Menlo;
}

/* PREVIEW */
#previewWrap{flex:1}
iframe{
  width:100%;
  height:100%;
  border:none;
  background:var(--bg);
}

/* FOOTER */
footer{
  padding:8px 14px;
  font-size:12px;
  color:var(--muted);
  border-top:1px solid var(--line);
  display:flex;
  justify-content:space-between;
}

@media(max-width:900px){
  main{flex-direction:column}
  #files{width:100%;display:flex}
  .file{flex:1}
  #editor{width:100%;height:40%}
}
</style>
</head>

<body data-theme="dark">

<header>
  <strong>OMNI HTML Reader</strong>
  <button onclick="newFile()">New</button>
  <button onclick="renameFile()">Rename</button>
  <button onclick="deleteFile()">Delete</button>
  <button onclick="toggleTheme()">Theme</button>
  <span id="status"></span>
</header>

<main>
  <aside id="files"></aside>

  <section id="editor">
    <div id="lineNumbers"></div>
    <textarea id="input" spellcheck="false"></textarea>
  </section>

  <section id="previewWrap">
    <iframe id="preview" sandbox="allow-same-origin"></iframe>
  </section>
</main>

<footer>
  <span>Multi-file · Line numbers · HTML reader</span>
  <span id="chars">0 chars</span>
</footer>

<script>
const FILES_KEY='omni_html_files'
const ACTIVE_KEY='omni_html_active'
const THEME_KEY='omni_html_theme'

let files=JSON.parse(localStorage.getItem(FILES_KEY)||'{}')
let active=localStorage.getItem(ACTIVE_KEY)

const fileList=document.getElementById('files')
const input=document.getElementById('input')
const preview=document.getElementById('preview')
const lines=document.getElementById('lineNumbers')
const chars=document.getElementById('chars')
const status=document.getElementById('status')

if(!Object.keys(files).length){
  files['index.html']=sampleHTML()
  active='index.html'
  saveAll()
}
if(!files[active]) active=Object.keys(files)[0]

renderFiles()
load()

input.addEventListener('input',()=>{
  files[active]=input.value
  preview.srcdoc=input.value
  updateLines()
  chars.textContent=input.value.length+' chars'
  autoSave()
})

input.addEventListener('scroll',()=>{
  lines.scrollTop=input.scrollTop
})

function updateLines(){
  const count=input.value.split('\n').length
  lines.innerHTML=Array.from({length:count},(_,i)=>i+1).join('<br>')
}

/* FILE MANAGEMENT */
function renderFiles(){
  fileList.innerHTML=''
  Object.keys(files).forEach(f=>{
    const d=document.createElement('div')
    d.className='file'+(f===active?' active':'')
    d.textContent=f
    d.onclick=()=>switchFile(f)
    fileList.appendChild(d)
  })
}

function switchFile(f){
  active=f
  load()
  renderFiles()
}

function load(){
  input.value=files[active]
  preview.srcdoc=input.value
  updateLines()
  chars.textContent=input.value.length+' chars'
  localStorage.setItem(ACTIVE_KEY,active)
}

function newFile(){
  const n=prompt('File name','page.html')
  if(!n||files[n])return
  files[n]=''
  active=n
  saveAll()
  renderFiles()
  load()
}

function renameFile(){
  const n=prompt('Rename file',active)
  if(!n||files[n])return
  files[n]=files[active]
  delete files[active]
  active=n
  saveAll()
  renderFiles()
}

function deleteFile(){
  if(!confirm('Delete '+active+'?'))return
  delete files[active]
  active=Object.keys(files)[0]||''
  saveAll()
  renderFiles()
  load()
}

/* SAVE */
let t
function autoSave(){
  clearTimeout(t)
  t=setTimeout(saveAll,400)
}

function saveAll(){
  localStorage.setItem(FILES_KEY,JSON.stringify(files))
  localStorage.setItem(ACTIVE_KEY,active)
  status.textContent='Saved'
  setTimeout(()=>status.textContent='',700)
}

/* THEME */
function toggleTheme(){
  const t=document.body.dataset.theme==='dark'?'light':'dark'
  document.body.dataset.theme=t
  localStorage.setItem(THEME_KEY,t)
}
const t0=localStorage.getItem(THEME_KEY)
if(t0)document.body.dataset.theme=t0

function sampleHTML(){
return ``
}
</script>

</body>
</html>
