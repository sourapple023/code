<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Web Playground</title>

<meta name="viewport"
  content="width=device-width,
  initial-scale=1,
  maximum-scale=1,
  viewport-fit=cover" />

<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%}

body{
  font-family:system-ui;
  background:#0d1117;
  color:#e6edf3;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  padding:10px 14px;
  border-bottom:1px solid #30363d;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
  justify-content:space-between;
}

button{
  border:1px solid #30363d;
  background:#161b22;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
}
button:hover{background:#303a45}

#status{font-size:12px;opacity:.7}

/* MAIN */
main{
  flex:1;
  display:flex;
  min-height:0;
}

/* EDITORS */
.editorColumn{
  width:380px;
  display:flex;
  flex-direction:column;
  border-right:1px solid #30363d;
  position:relative;
}
label{
  font-size:11px;
  opacity:.6;
  padding:4px 8px;
}
textarea{
  flex:1;
  border:none;
  outline:none;
  resize:none;
  background:#161b22;
  color:white;
  padding:10px;
  font-family:monospace;
  font-size:13px;
  position:relative;
  z-index:1;
}

/* 👻 Ghost suggestion */
.ghost{
  position:absolute;
  left:10px;
  right:10px;
  bottom:10px;
  color:#6b7280;
  font-family:monospace;
  font-size:13px;
  pointer-events:none;
  white-space:pre-wrap;
  opacity:.45;
}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  flex-direction:column;
  position:relative;
}
iframe{
  flex:1;
  border:none;
  background:white;
}

/* PANELS */
.panel{
  font-size:12px;
  padding:8px;
  border-top:1px solid #30363d;
  background:#0b0f14;
}

/* SUGGESTIONS */
.suggestion{
  border:1px solid #30363d;
  border-radius:6px;
  padding:6px;
  margin-bottom:6px;
}
.suggestion button{
  margin-top:4px;
  font-size:12px;
}

/* FULLSCREEN */
body.fs header,
body.fs .editorColumn{
  display:none;
}
body.fs .preview{
  position:fixed;
  inset:0;
  z-index:9999;
  background:#000;
}

/* MOBILE */
@media(max-width:900px){
  main{flex-direction:column}
  .editorColumn{
    width:100%;
    border-right:none;
    border-bottom:1px solid #30363d;
  }
}
</style>
</head>

<body>
<header>
  <strong>Web Playground</strong>
  <div>
    <button onclick="run()">Run</button>
    <button onclick="toggleFullscreen()" id="fsBtn">Fullscreen</button>
    <button onclick="acceptGhost()">👻 Ghost</button>
    <span id="status">Ready</span>
  </div>
</header>

<main>
  <div class="editorColumn">
    <label>HTML</label>
    <textarea id="html"></textarea>
    <div class="ghost" id="ghost"></div>

    <label>CSS</label>
    <textarea id="css"></textarea>

    <label>JavaScript</label>
    <textarea id="js"></textarea>
  </div>

  <div class="preview">
    <iframe id="preview"></iframe>
    <div class="panel" id="brain"></div>
  </div>
</main>

<script>
/* ELEMENTS */
const htmlI=html, cssI=css, jsI=js
const preview=document.getElementById("preview")
const brainEl=document.getElementById("brain")
const ghostEl=document.getElementById("ghost")
const fsBtn=document.getElementById("fsBtn")
const statusEl=document.getElementById("status")

/* BRAIN MEMORY */
const brain = JSON.parse(localStorage.brain || `{"accepts":{},"ignores":{}}`)
const saveBrain=()=>localStorage.brain=JSON.stringify(brain)

/* RUN */
function run(){
  preview.srcdoc=`
<!DOCTYPE html>
<html>
<head><style>${cssI.value}</style></head>
<body>
${htmlI.value}
<script>
${jsI.value.replace(/<\/script/ig,"<\\/script")}
<\/script>
</body>
</html>`
  analyze()
  statusEl.textContent="Synced"
}

/* FULLSCREEN TOGGLE (HARD SAFE) */
function toggleFullscreen(){
  const fsActive = document.fullscreenElement || document.body.classList.contains("fs")

  if(!fsActive){
    document.body.classList.add("fs")
    document.documentElement.requestFullscreen?.().catch(()=>{})
    fsBtn.textContent="Exit"
  }else{
    document.exitFullscreen?.()
    document.body.classList.remove("fs")
    fsBtn.textContent="Fullscreen"
  }
}
document.addEventListener("fullscreenchange",()=>{
  const on=!!document.fullscreenElement
  document.body.classList.toggle("fs",on)
  fsBtn.textContent=on?"Exit":"Fullscreen"
})

/* ANALYZE + GHOST */
let currentGhost=null

function analyze(){
  brainEl.innerHTML=""
  ghostEl.textContent=""
  currentGhost=null

  const suggestions=[]

  const score=k=>(brain.accepts[k]||0)-(brain.ignores[k]||0)
  const suggest=(key,text,apply)=>suggestions.push({key,text,apply,weight:score(key)})

  if(htmlI.value && !htmlI.value.includes("viewport")){
    suggest("viewport","<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">",()=>{
      htmlI.value=`<meta name="viewport" content="width=device-width, initial-scale=1">\n`+htmlI.value
    })
  }

  if(jsI.value && !jsI.value.includes("DOMContentLoaded")){
    suggest("domready","document.addEventListener(\"DOMContentLoaded\",()=>{ … })",()=>{
      jsI.value=`document.addEventListener("DOMContentLoaded",()=>{\n${jsI.value}\n});`
    })
  }

  if(!suggestions.length){
    brainEl.textContent="🧠 No suggestions"
    return
  }

  suggestions.sort((a,b)=>b.weight-a.weight)
  const top=suggestions[0]
  currentGhost=top
  ghostEl.textContent=top.text

  suggestions.forEach(s=>{
    const div=document.createElement("div")
    div.className="suggestion"
    div.innerHTML=s.text+"<br>"
    const a=document.createElement("button")
    a.textContent="Apply"
    a.onclick=()=>{
      brain.accepts[s.key]=(brain.accepts[s.key]||0)+1
      saveBrain()
      s.apply()
      run()
    }
    div.appendChild(a)
    brainEl.appendChild(div)
  })
}

/* ACCEPT GHOST */
function acceptGhost(){
  if(!currentGhost) return
  brain.accepts[currentGhost.key]=(brain.accepts[currentGhost.key]||0)+1
  saveBrain()
  currentGhost.apply()
  run()
}

/* TAB ACCEPT (DESKTOP) */
htmlI.addEventListener("keydown",e=>{
  if(e.key==="Tab" && currentGhost){
    e.preventDefault()
    acceptGhost()
  }
})

/* INPUT */
let t
;[htmlI,cssI,jsI].forEach(el=>el.oninput=()=>{
  statusEl.textContent="Typing…"
  clearTimeout(t)
  t=setTimeout(run,300)
})

run()
</script>
</body>
</html>
