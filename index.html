<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Web Playground</title>

<meta name="viewport"
  content="width=device-width,
  initial-scale=1,
  maximum-scale=1,
  viewport-fit=cover" />

<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%}

body{
  font-family:system-ui;
  background:#0d1117;
  color:#e6edf3;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  padding:10px 14px;
  border-bottom:1px solid #30363d;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
  justify-content:space-between;
}

button{
  border:1px solid #30363d;
  background:#161b22;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
}
button:hover{background:#303a45}

#status{font-size:12px;opacity:.7}

/* MAIN */
main{
  flex:1;
  display:flex;
  min-height:0;
}

/* EDITORS */
.editorColumn{
  width:380px;
  display:flex;
  flex-direction:column;
  border-right:1px solid #30363d;
}
label{
  font-size:11px;
  opacity:.6;
  padding:4px 8px;
}
textarea{
  flex:1;
  border:none;
  outline:none;
  resize:none;
  background:#161b22;
  color:white;
  padding:10px;
  font-family:monospace;
  font-size:13px;
}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  flex-direction:column;
  position:relative;
}
iframe{
  flex:1;
  border:none;
  background:white;
}

/* PANELS */
.panel{
  font-size:12px;
  padding:8px;
  border-top:1px solid #30363d;
  background:#0b0f14;
}

/* SUGGESTIONS */
.suggestion{
  border:1px solid #30363d;
  border-radius:6px;
  padding:6px;
  margin-bottom:6px;
}
.suggestion button{
  margin-top:4px;
  font-size:12px;
}

/* FULLSCREEN (Visual fallback for iOS) */
body.fs header,
body.fs .editorColumn{
  display:none;
}
body.fs main{
  flex:1;
}
body.fs .preview{
  position:fixed;
  inset:0;
  z-index:9999;
  background:#000;
}

/* LIGHT */
body.light{
  background:#fff;
  color:#000;
}
body.light textarea,
body.light button{
  background:#f2f2f2;
  color:#000;
  border-color:#ccc;
}
body.light header,
body.light .editorColumn,
body.light .panel{
  border-color:#ccc;
}

/* MOBILE */
@media(max-width:900px){
  main{flex-direction:column}
  .editorColumn{
    width:100%;
    border-right:none;
    border-bottom:1px solid #30363d;
  }
}
</style>
</head>

<body>
<header>
  <strong>Web Playground</strong>
  <div>
    <button onclick="run()">Run</button>
    <button onclick="toggleFullscreen()" id="fsBtn">Fullscreen</button>
    <span id="status">Ready</span>
  </div>
</header>

<main>
  <div class="editorColumn">
    <label>HTML</label><textarea id="html"></textarea>
    <label>CSS</label><textarea id="css"></textarea>
    <label>JavaScript</label><textarea id="js"></textarea>
  </div>

  <div class="preview" id="previewWrap">
    <iframe id="preview"></iframe>
    <div class="panel" id="brain"></div>
  </div>
</main>

<script>
/* ELEMENTS */
const htmlI=html, cssI=css, jsI=js
const preview=document.getElementById("preview")
const brainEl=document.getElementById("brain")
const statusEl=document.getElementById("status")
const fsBtn=document.getElementById("fsBtn")

/* ───── BRAIN MEMORY ───── */
const brain = JSON.parse(localStorage.brain || `{
  "accepts":{},
  "ignores":{}
}`)

function saveBrain(){
  localStorage.brain = JSON.stringify(brain)
}

/* ───── RUN ───── */
function run(){
  preview.srcdoc=`
<!DOCTYPE html>
<html>
<head><style>${cssI.value}</style></head>
<body>
${htmlI.value}
<script>
${jsI.value.replace(/<\/script/ig,"<\\/script")}
<\/script>
</body>
</html>`
  analyze()
  statusEl.textContent="Synced"
}

/* ───── FULLSCREEN (SMART) ───── */
function toggleFullscreen(){
  const root=document.documentElement

  // Try real fullscreen
  if(!document.fullscreenElement && root.requestFullscreen){
    root.requestFullscreen().catch(()=>{})
    document.body.classList.add("fs")
    fsBtn.textContent="Exit"
  }
  else if(document.fullscreenElement){
    document.exitFullscreen()
    document.body.classList.remove("fs")
    fsBtn.textContent="Fullscreen"
  }
  // iOS fallback
  else{
    document.body.classList.toggle("fs")
    fsBtn.textContent=
      document.body.classList.contains("fs")?"Exit":"Fullscreen"
  }
}

/* Keep state synced if user exits via system gesture */
document.addEventListener("fullscreenchange",()=>{
  const active=!!document.fullscreenElement
  document.body.classList.toggle("fs",active)
  fsBtn.textContent=active?"Exit":"Fullscreen"
})

/* ───── ANALYSIS & SUGGESTIONS ───── */
function analyze(){
  brainEl.innerHTML=""
  const suggestions=[]
  const score = k => (brain.accepts[k]||0)-(brain.ignores[k]||0)

  function suggest(key,text,apply){
    suggestions.push({key,text,apply,weight:score(key)})
  }

  if(htmlI.value && !htmlI.value.includes("viewport")){
    suggest("viewport","Add mobile viewport meta",()=>{
      htmlI.value=`<meta name="viewport" content="width=device-width, initial-scale=1">\n`+htmlI.value
    })
  }

  if(jsI.value && !jsI.value.includes("DOMContentLoaded")){
    suggest("domready","Wrap JS in DOMContentLoaded",()=>{
      jsI.value=`document.addEventListener("DOMContentLoaded",()=>{\n${jsI.value}\n});`
    })
  }

  if(!suggestions.length){
    brainEl.textContent="🧠 No suggestions right now"
    return
  }

  suggestions
    .sort((a,b)=>b.weight-a.weight)
    .forEach(s=>{
      const div=document.createElement("div")
      div.className="suggestion"
      div.innerHTML=`${s.text}<br>`

      const apply=document.createElement("button")
      apply.textContent="Apply"
      apply.onclick=()=>{
        brain.accepts[s.key]=(brain.accepts[s.key]||0)+1
        saveBrain()
        s.apply()
        run()
      }

      const ignore=document.createElement("button")
      ignore.textContent="Ignore"
      ignore.style.marginLeft="6px"
      ignore.onclick=()=>{
        brain.ignores[s.key]=(brain.ignores[s.key]||0)+1
        saveBrain()
        analyze()
      }

      div.appendChild(apply)
      div.appendChild(ignore)
      brainEl.appendChild(div)
    })
}

/* INPUT */
let t
;[htmlI,cssI,jsI].forEach(el=>el.oninput=()=>{
  statusEl.textContent="Typing…"
  clearTimeout(t)
  t=setTimeout(run,300)
})

run()
</script>
</body>
</html>
