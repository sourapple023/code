<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Web Playground</title>

<meta name="viewport"
  content="width=device-width,
  initial-scale=1,
  maximum-scale=1,
  viewport-fit=cover" />

<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%}

body{
  font-family:system-ui;
  background:#0d1117;
  color:#e6edf3;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  padding:10px 14px;
  border-bottom:1px solid #30363d;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
  justify-content:space-between;
}

button,input{
  border:1px solid #30363d;
  background:#161b22;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
}
button:hover{background:#303a45}

#status{font-size:12px;opacity:.7}

/* MAIN */
main{
  flex:1;
  display:flex;
  min-height:0;
}

/* EDITOR */
.editorColumn{
  width:420px;
  display:flex;
  flex-direction:column;
  border-right:1px solid #30363d;
  position:relative;
}
label{
  font-size:11px;
  opacity:.6;
  padding:4px 8px;
}
textarea{
  flex:1;
  border:none;
  outline:none;
  resize:none;
  background:#161b22;
  color:white;
  padding:10px;
  font-family:monospace;
  font-size:13px;
}

/* 👻 Ghost */
.ghost{
  position:absolute;
  left:10px;
  right:10px;
  bottom:10px;
  color:#6b7280;
  font-family:monospace;
  font-size:13px;
  pointer-events:none;
  white-space:pre-wrap;
  opacity:.45;
  display:none;
}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  flex-direction:column;
}
iframe{
  flex:1;
  border:none;
  background:white;
}

/* PANELS */
.panel{
  font-size:12px;
  padding:8px;
  border-top:1px solid #30363d;
  background:#0b0f14;
}

/* FULLSCREEN */
body.fs header,
body.fs .editorColumn{
  display:none;
}
body.fs .preview{
  position:fixed;
  inset:0;
  z-index:9999;
  background:#000;
}

/* MOBILE */
@media(max-width:900px){
  main{flex-direction:column}
  .editorColumn{
    width:100%;
    border-right:none;
    border-bottom:1px solid #30363d;
  }
}
</style>
</head>

<body>
<header>
  <strong>Web Playground</strong>
  <div>
    <input id="nlInput" placeholder="say what you want…" />
    <button onclick="run()">Run</button>
    <button onclick="toggleFullscreen()" id="fsBtn">Fullscreen</button>
    <button onclick="acceptGhost()">👻</button>
    <button onclick="toggleMaintenance()" id="maintBtn">Maintenance</button>
    <span id="status">Ready</span>
  </div>
</header>

<main>
  <div class="editorColumn">
    <label>HTML Document</label>
    <textarea id="doc"></textarea>
    <div class="ghost" id="ghost"></div>
  </div>

  <div class="preview">
    <iframe id="preview"></iframe>
    <div class="panel" id="brain"></div>
  </div>
</main>

<script>
/* ELEMENTS */
const docI = document.getElementById("doc")
const nlInput = document.getElementById("nlInput")
const preview = document.getElementById("preview")
const ghostEl = document.getElementById("ghost")
const brainEl = document.getElementById("brain")
const fsBtn = document.getElementById("fsBtn")
const maintBtn = document.getElementById("maintBtn")
const statusEl = document.getElementById("status")

/* ───── FULLSCREEN (SYNC SAFE) ───── */
function toggleFullscreen(){
  const active = document.fullscreenElement || document.body.classList.contains("fs")
  if(!active){
    document.body.classList.add("fs")
    document.documentElement.requestFullscreen?.().catch(()=>{})
  }else{
    document.exitFullscreen?.()
    document.body.classList.remove("fs")
  }
}
addEventListener("fullscreenchange",()=>{
  const on = !!document.fullscreenElement
  document.body.classList.toggle("fs",on)
  fsBtn.textContent = on ? "Exit" : "Fullscreen"
})

/* ───── MAINTENANCE MODE (IDEMPOTENT) ───── */
const Maintenance = { enabled:false, ran:false }
function toggleMaintenance(){
  Maintenance.enabled = !Maintenance.enabled
  Maintenance.ran = false
  maintBtn.textContent = Maintenance.enabled ? "Maintenance ON" : "Maintenance"
}

/* ───── SAFE HELPERS ───── */
function ensureHead(html){
  if(/<head[\s>]/i.test(html)) return html
  return html.replace(/<html[^>]*>/i, m => m + "\n<head></head>")
}

function ensureViewport(html){
  if(/viewport/i.test(html)) return html
  html = ensureHead(html)
  return html.replace(/<head[^>]*>/i,
    m => m + `\n<meta name="viewport" content="width=device-width, initial-scale=1">`)
}

/* ───── RUN ───── */
function run(){
  let html = docI.value

  if(Maintenance.enabled && !Maintenance.ran){
    html = ensureViewport(html)
    Maintenance.ran = true
    docI.value = html
  }

  // Ensure valid preview document
  if(!/<!doctype/i.test(html)){
    html = `<!DOCTYPE html>\n${html}`
  }

  preview.srcdoc = html
  analyze()
  statusEl.textContent =
    Maintenance.enabled ? "Maintenance active" : "Synced"
}

/* ───── BRAIN MEMORY ───── */
const brain = JSON.parse(localStorage.brain || '{"accepts":{},"ignores":{}}')
const saveBrain = ()=>localStorage.brain = JSON.stringify(brain)

/* ───── NATURAL LANGUAGE → GHOST (SAFE) ───── */
let currentGhost=null

function nlToSuggestion(text){
  text=text.toLowerCase()

  if(text.includes("responsive"))
    return {
      key:"viewport",
      ghost:`<meta name="viewport" content="width=device-width, initial-scale=1">`,
      apply:()=>docI.value = ensureViewport(docI.value)
    }

  if(text.includes("button"))
    return {
      key:"button",
      ghost:`<button>Click me</button>`,
      apply:()=>{
        if(!/<button/i.test(docI.value))
          docI.value += `\n<button>Click me</button>`
      }
    }

  if(text.includes("center"))
    return {
      key:"center",
      ghost:`<style>body{display:flex;align-items:center;justify-content:center}</style>`,
      apply:()=>{
        if(!/display:flex/i.test(docI.value))
          docI.value +=
            `\n<style>body{display:flex;align-items:center;justify-content:center}</style>`
      }
    }

  return null
}

/* ───── ANALYZE ───── */
function analyze(){
  ghostEl.style.display="none"
  brainEl.textContent="🧠 ready"
}

/* NL INPUT */
nlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const s = nlToSuggestion(nlInput.value)
    nlInput.value=""
    if(!s) return
    currentGhost=s
    ghostEl.textContent=s.ghost
    ghostEl.style.display="block"
    brainEl.textContent="🧠 suggestion ready"
  }
})

/* ACCEPT GHOST */
function acceptGhost(){
  if(!currentGhost) return
  brain.accepts[currentGhost.key]=(brain.accepts[currentGhost.key]||0)+1
  saveBrain()
  currentGhost.apply()
  ghostEl.style.display="none"
  currentGhost=null
  run()
}

/* TAB ACCEPT */
docI.addEventListener("keydown",e=>{
  if(e.key==="Tab" && currentGhost){
    e.preventDefault()
    acceptGhost()
  }
})

/* AUTORUN */
let t
docI.oninput=()=>{
  statusEl.textContent="Typing…"
  clearTimeout(t)
  t=setTimeout(run,300)
}

/* INIT */
run()
</script>
</body>
</html>
