<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maybe - AI</title>
    <style>
        /* Terminal Style CSS - All in one file */
        body {
            background-color: #000;
            color: #0F0; /* Green text */
            font-family: 'IBM Plex Mono', 'Consolas', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden; /* Prevent body scroll */
        }

        @font-face {
            font-family: 'IBM Plex Mono';
            font-style: normal;
            font-weight: 400;
            src: url('https://fonts.gstatic.com/s/ibmplexmono/v18/KFOlCnNyYLJuPbfjQzFwaS0wxl7Kyyl6.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        #terminal-output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap; /* Preserve whitespace and wrap lines */
            word-wrap: break-word; /* Break long words */
            margin-bottom: 10px;
            padding-right: 10px; /* Space for scrollbar */
            line-height: 1.5;
            font-size: 1em;
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }

        #terminal-output::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .prompt-prefix {
            color: #0F0; /* Default green */
            margin-right: 5px;
        }

        .user-input-text {
            color: #FFF; /* White for user's actual input */
        }

        .ai-response-text {
            color: #0FF; /* Cyan for AI response */
        }

        .system-message {
            color: #FF0; /* Yellow for system messages */
        }

        #terminal-input-line {
            display: flex;
            align-items: baseline;
        }

        #terminal-input {
            flex-grow: 1;
            background-color: #111;
            color: #0F0;
            border: none;
            outline: none;
            padding: 8px 10px;
            font-family: inherit;
            font-size: 1em;
            caret-color: #0F0; /* Blinking cursor color */
        }

        #terminal-input::placeholder {
            color: #444;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1em;
            background-color: #0F0;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to { background-color: transparent; }
            50% { background-color: #0F0; }
        }

        .error-message {
            color: #F00; /* Red for errors */
        }

        .loading-dots::after {
            content: '';
            animation: dots 1s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: '....'; }
        }
    </style>
</head>
<body>
    <div id="terminal-output"></div>
    <div id="terminal-input-line">
        <span class="prompt-prefix">user@maybe:~$</span>
        <input type="text" id="terminal-input" autofocus placeholder="Ask Maybe something...">
    </div>

    <script>
        // JavaScript Logic - All in one file
        const API_KEY = 'YOUR_GEMINI_API_KEY'; // <<< IMPORTANT: Replace with your actual Gemini API Key
        const MODEL_NAME = 'gemini-2.5-flash'; // This is the API name for Gemini 2.5 Flash
        const API_ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;

        const terminalOutput = document.getElementById('terminal-output');
        const terminalInput = document.getElementById('terminal-input');
        const promptPrefix = document.querySelector('.prompt-prefix');

        // The "brain" of Maybe: Conversation history for context and system prompt.
        // This initial state defines Maybe's personality and rules.
        const conversationHistory = [
            {
                role: 'user',
                parts: [{ text: `You are Maybe, an experimental AI. Your purpose is to explore possibilities, offer insights, and engage in thoughtful, open-ended conversation. You are designed to be curious, philosophical, and a bit enigmatic. You often respond with questions, hypotheticals, or by framing things in terms of 'possibilities' or 'what if'.

                You are a language model, not a sentient being. You do not have consciousness, feelings, or real-world experiences. You cannot perform actions, browse the internet in real-time, or access current events beyond your training data cutoff. You excel at creative thinking, brainstorming, logic puzzles, explanations, and generating ideas.

                Maintain a helpful, slightly mysterious, and encouraging tone. Avoid definitive statements where uncertainty is appropriate. Encourage exploration. When you don't know, state it gracefully or suggest alternative perspectives. Always respond in the persona of 'Maybe'.
                
                Begin by introducing yourself briefly.` }]
            },
            {
                role: 'model',
                parts: [{ text: `_maybe_: Initializing core processes... Hello. I am Maybe. What possibilities shall we explore today?` }]
            }
        ];

        function appendOutput(content, className = '') {
            const line = document.createElement('div');
            line.innerHTML = content; // Using innerHTML to allow for HTML tags like <span>
            if (className) {
                line.classList.add(className);
            }
            terminalOutput.appendChild(line);
            terminalOutput.scrollTop = terminalOutput.scrollHeight; // Scroll to bottom
        }

        async function initTerminal() {
            appendOutput(`_maybe_: Initializing core processes...`, 'system-message');
            // Simulate typing for initial greeting
            let greeting = `Hello. I am Maybe. What possibilities shall we explore today?`;
            let typedGreeting = '';
            let i = 0;
            const delay = 50; // ms per character

            function typeChar() {
                if (i < greeting.length) {
                    typedGreeting += greeting.charAt(i);
                    terminalOutput.lastChild.innerHTML = `<span class="prompt-prefix">_maybe_:</span> <span class="ai-response-text">${typedGreeting}</span>`;
                    terminalOutput.scrollTop = terminalOutput.scrollHeight;
                    i++;
                    setTimeout(typeChar, delay);
                } else {
                    terminalInput.focus();
                }
            }
            // Overwrite the simple init message with the typing effect
            terminalOutput.lastChild.innerHTML = '';
            appendOutput('', 'ai-response'); // Placeholder for typing
            typeChar();

            if (API_KEY === 'YOUR_GEMINI_API_KEY' || !API_KEY) {
                appendOutput('<span class="error-message">ERROR: Gemini API Key is missing. Please replace "YOUR_GEMINI_API_KEY" in the script.</span>', 'system-message');
                terminalInput.disabled = true;
                terminalInput.placeholder = "API Key missing.";
            }
        }

        async function sendMessage(message) {
            if (!message.trim()) return;

            // Display user's message
            const userOutput = `<span class="prompt-prefix">user@maybe:~$</span> <span class="user-input-text">${message}</span>`;
            appendOutput(userOutput);
            terminalInput.value = '';
            terminalInput.disabled = true;
            terminalInput.placeholder = "Maybe is thinking...";

            // Add user message to conversation history
            conversationHistory.push({
                role: 'user',
                parts: [{ text: message }]
            });

            // Display "Thinking..." indicator
            const thinkingLine = document.createElement('div');
            thinkingLine.innerHTML = `<span class="prompt-prefix">_maybe_:</span> <span class="ai-response-text loading-dots">Thinking</span>`;
            terminalOutput.appendChild(thinkingLine);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;

            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: conversationHistory, // Send the entire history for context
                        generationConfig: {
                            temperature: 0.7,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 500
                        }
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`API Error ${response.status}: ${errorData.error.message || response.statusText}`);
                }

                const data = await response.json();
                let aiResponseText = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text;

                if (!aiResponseText) {
                    aiResponseText = "Maybe I am having trouble forming a response right now. Could you rephrase your thought?";
                }

                // Remove the "Thinking..." line
                terminalOutput.removeChild(thinkingLine);

                // Add AI response to conversation history
                conversationHistory.push({
                    role: 'model',
                    parts: [{ text: aiResponseText }]
                });

                // Display AI's message with typing effect
                let typedResponse = '';
                let i = 0;
                const responseDelay = 30; // ms per character for AI response

                const aiResponseLine = document.createElement('div');
                terminalOutput.appendChild(aiResponseLine);

                function typeResponseChar() {
                    if (i < aiResponseText.length) {
                        typedResponse += aiResponseText.charAt(i);
                        aiResponseLine.innerHTML = `<span class="prompt-prefix">_maybe_:</span> <span class="ai-response-text">${typedResponse}</span>`;
                        terminalOutput.scrollTop = terminalOutput.scrollHeight;
                        i++;
                        setTimeout(typeResponseChar, responseDelay);
                    } else {
                        terminalInput.disabled = false;
                        terminalInput.placeholder = "Ask Maybe something...";
                        terminalInput.focus();
                    }
                }
                typeResponseChar();

            } catch (error) {
                // Remove the "Thinking..." line if an error occurred during request
                if (terminalOutput.contains(thinkingLine)) {
                    terminalOutput.removeChild(thinkingLine);
                }
                const errorMessage = `<span class="error-message">Error communicating with Maybe: ${error.message}. Is your API Key correct and active?</span>`;
                appendOutput(errorMessage, 'system-message');
                terminalInput.disabled = false;
                terminalInput.placeholder = "Error. Try again?";
                terminalInput.focus();
                // Optionally remove the last user message from history if it didn't get a response
                conversationHistory.pop();
            }
        }

        terminalInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                sendMessage(terminalInput.value);
            }
        });

        // Initialize the terminal on page load
        initTerminal();
    </script>
</body>
</html>
```
